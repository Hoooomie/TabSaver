<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8e8e8;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a73e8;
    }
    .header .icon {
      font-size: 20px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .status-label {
      color: #666;
      font-size: 12px;
    }
    .status-value {
      font-weight: 500;
      font-size: 13px;
    }
    .status-connected {
      color: #34a853;
    }
    .status-disconnected {
      color: #ea4335;
    }
    .mode-auto {
      color: #34a853;
    }
    .mode-manual {
      color: #f9ab00;
    }
    .btn-sync {
      width: 100%;
      margin-top: 12px;
      padding: 8px 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-sync:hover {
      background: #1557b0;
    }
    .btn-sync:active {
      background: #174ea6;
    }
    .btn-tracker {
      width: 100%;
      margin-top: 8px;
      padding: 8px 16px;
      background: #fff;
      color: #1a73e8;
      border: 1px solid #1a73e8;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-tracker:hover {
      background: #e8f0fe;
    }
    .tracker-stats {
      margin-top: 8px;
      padding: 8px;
      background: #f0f4ff;
      border-radius: 6px;
      font-size: 11px;
      color: #555;
    }
    .tracker-stats .stat {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .tracker-stats .stat-val {
      font-weight: 500;
      color: #1a73e8;
    }
    .tip {
      margin-top: 12px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">💾</span>
    <h1>TabSaver</h1>
  </div>

  <div class="status-row">
    <span class="status-label">Native Host 连接</span>
    <span id="connectionStatus" class="status-value">检测中...</span>
  </div>

  <div class="status-row">
    <span class="status-label">保存模式</span>
    <span id="modeStatus" class="status-value">-</span>
  </div>

  <div class="status-row">
    <span class="status-label">当前标签页数</span>
    <span id="tabCount" class="status-value">-</span>
  </div>

  <div class="status-row">
    <span class="status-label">上次同步</span>
    <span id="lastSync" class="status-value">-</span>
  </div>

  <button id="btnSync" class="btn-sync">立即同步</button>

  <button id="btnTracker" class="btn-tracker">查看专注力报告</button>

  <div class="tracker-stats" id="trackerStats">
    <div class="stat">
      <span>今日活跃</span>
      <span class="stat-val" id="todayActive">-</span>
    </div>
    <div class="stat">
      <span>最常访问</span>
      <span class="stat-val" id="todayTopDomain">-</span>
    </div>
  </div>

  <div class="tip" id="tipText">
    标签页数据会在每次变化时自动同步。<br>
    关闭Chrome时，所有标签页将被保存到本地。
  </div>

  <script src="popup.js"></script>
</body>
</html>
